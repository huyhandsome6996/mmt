<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Thuật Toán Merge Sort</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            /* Tailwind slate-900 */
            color: #f8fafc;
            /* Tailwind slate-50 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .block-el {
            position: absolute;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.125rem;
            border-radius: 0.5rem;
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            /* Transition set dynamically by JS for speed control */
        }

        .code-line {
            padding: 0.1rem 0.5rem;
            border-radius: 0.25rem;
            border-left: 3px solid transparent;
            transition: all 0.2s;
            white-space: pre;
            /* Giữ nguyên khoảng trắng lùi đầu dòng */
            font-family: 'Consolas', 'Courier New', monospace;
            /* Font chuẩn code */
            color: #d4d4d4;
            /* Màu chữ trắng xám mặc định của VS Code */
        }

        .code-line.active-line {
            background-color: rgba(253, 224, 71, 0.15);
            /* Nền highlight nhạt, tinh tế hơn */
            border-left: 3px solid #fde047;
            /* Viền vàng */
        }

        /* Custom scrollbar for code area */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>

<body class="min-h-screen p-4 lg:p-8">

    <div class="max-w-7xl mx-auto flex flex-col gap-6">

        <!-- Header -->
        <div class="text-center">
            <h1 class="text-3xl font-bold text-blue-400 mb-2">Trình Mô Phỏng Merge Sort</h1>
            <p class="text-slate-400">Quan sát chiến lược "Chia để trị" và cách từng dòng code Python hoạt động</p>
        </div>

        <!-- Main Layout -->
        <div
            class="flex flex-col lg:flex-row gap-6 bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700">

            <!-- Left Panel: Visualization & Controls -->
            <div class="w-full lg:w-2/3 p-6 flex flex-col justify-between">

                <!-- Control Panel -->
                <div
                    class="bg-slate-900 p-4 rounded-lg flex flex-wrap gap-4 items-center justify-between mb-8 border border-slate-700">
                    <div class="flex gap-2">
                        <button onclick="generateRandomArray()"
                            class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded font-medium transition-colors">
                            🎲 Tạo mảng mới
                        </button>
                        <button onclick="resetToInitial()"
                            class="bg-slate-600 hover:bg-slate-500 text-white px-4 py-2 rounded font-medium transition-colors">
                            🔄 Khôi phục
                        </button>
                    </div>

                    <div class="flex items-center gap-4 border-l border-slate-700 pl-4">
                        <button id="play-btn" onclick="togglePlay()"
                            class="bg-green-600 hover:bg-green-500 text-white w-36 py-2 rounded font-medium transition-colors">
                            ▶️ Chạy tự động
                        </button>
                        <button id="step-btn" onclick="stepNext()"
                            class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-medium transition-colors">
                            ⏭️ Chạy 1 bước
                        </button>
                    </div>

                    <div class="flex items-center gap-2 border-l border-slate-700 pl-4">
                        <label class="text-sm text-slate-300">Tốc độ:</label>
                        <input type="range" id="speed-slider" min="100" max="1500" value="600" dir="rtl"
                            class="w-24 cursor-pointer">
                    </div>
                </div>

                <!-- Explanation Box (Thêm mới) -->
                <div id="explanation-box"
                    class="bg-indigo-900/50 text-indigo-100 p-4 rounded-lg border border-indigo-700/50 font-medium mb-6 min-h-[72px] flex items-center shadow-inner transition-all duration-300">
                    Bấm "Chạy tự động" hoặc "Chạy 1 bước" để bắt đầu mô phỏng thuật toán.
                </div>

                <!-- Visualization Area (Nâng chiều cao để chứa cây đệ quy) -->
                <div class="flex-grow flex items-center justify-center min-h-[400px]">
                    <div id="array-container" class="relative w-full max-w-[600px] h-[350px]">
                        <!-- DOM Blocks will be injected here -->
                    </div>
                </div>

                <!-- Legend -->
                <div class="flex flex-wrap justify-center gap-4 mt-6 text-sm text-slate-300">
                    <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-blue-500 inline-block"></span>
                        Chưa sắp xếp</div>
                    <div class="flex items-center gap-2"><span
                            class="w-4 h-4 rounded bg-yellow-400 inline-block"></span> Đang so sánh</div>
                    <div class="flex items-center gap-2"><span class="w-4 h-4 rounded bg-green-500 inline-block"></span>
                        Đưa vào mảng tạm</div>
                    <div class="flex items-center gap-2"><span
                            class="w-4 h-4 rounded bg-purple-600 inline-block"></span> Đã hợp nhất</div>
                </div>
            </div>

            <!-- Right Panel: Code Tracer -->
            <div class="w-full lg:w-1/3 bg-slate-900 border-l border-slate-700 flex flex-col max-h-[600px]">
                <div class="bg-slate-950 p-3 border-b border-slate-800 flex justify-between items-center">
                    <h2 class="font-bold text-slate-200">Mã nguồn Python</h2>
                    <span class="text-xs text-slate-500 bg-slate-800 px-2 py-1 rounded">Code Tracer</span>
                </div>
                <div id="code-container" class="p-4 font-mono text-[13px] leading-6 overflow-y-auto flex-grow">
                    <!-- Python code lines will be injected here -->
                </div>
            </div>

        </div>
    </div>

    <script>
        // --- CẤU HÌNH VÀ DỮ LIỆU ---
        const pythonCode = [
            'def merge_sort(arr):',
            '    if len(arr) <= 1:',
            '        return arr',
            '    mid = len(arr) // 2',
            '    left = arr[:mid]',
            '    right = arr[mid:]',
            '    left_sorted = merge_sort(left)',
            '    right_sorted = merge_sort(right)',
            '    return merge(left_sorted, right_sorted)',
            '',
            'def merge(left, right):',
            '    result = []',
            '    i = j = 0',
            '    while i < len(left) and j < len(right):',
            '        if left[i] < right[j]:',
            '            result.append(left[i])',
            '            i += 1',
            '        else:',
            '            result.append(right[j])',
            '            j += 1',
            '    result.extend(left[i:])',
            '    result.extend(right[j:])',
            '    return result'
        ];

        let initialArray = [];
        let domBlocks = [];
        let actions = [];           // Lưu trữ lịch sử từng thao tác (line code, animation)
        let currentActionIdx = 0;
        let isPlaying = false;
        let timer = null;
        const blockSpacing = 55;    // Khoảng cách chiều ngang giữa các khối
        const verticalSpacing = 75; // Khoảng cách chiều dọc giữa các cấp (Tree level)
        const ARRAY_SIZE = 10;

        // --- KHỞI TẠO GIAO DIỆN ---
        function initUI() {
            // Render Code
            const codeDiv = document.getElementById('code-container');
            codeDiv.innerHTML = '';
            pythonCode.forEach((line, index) => {
                const div = document.createElement('div');
                div.id = `line-${index}`;
                div.className = 'code-line';

                let htmlLine = line;

                // 1. Highlight Số (Màu xanh lá nhạt) - Cần chạy TRƯỚC để không dính vào HTML tags tạo ra ở dưới
                htmlLine = htmlLine.replace(/\b(\d+)\b/g, '<span class="text-[#b5cea8]">$1</span>');

                // 2. Highlight Từ khóa điều khiển (Màu hồng tím)
                htmlLine = htmlLine.replace(/\b(def|if|return|while|else|and)\b/g, '<span class="text-[#c586c0]">$1</span>');

                // 3. Highlight Tên hàm & phương thức (Màu vàng sáng)
                htmlLine = htmlLine.replace(/\b(merge_sort|merge|len|append|extend)\b/g, '<span class="text-[#dcdcaa]">$1</span>');

                div.innerHTML = htmlLine || ' '; // Giữ dòng trống
                codeDiv.appendChild(div);
            });

            generateRandomArray();
        }

        // --- LOGIC SINH MẢNG & DỰNG HÌNH ĐỒ HỌA ---
        function generateRandomArray() {
            pause();
            initialArray = [];
            for (let i = 0; i < ARRAY_SIZE; i++) {
                initialArray.push({
                    id: i,
                    value: Math.floor(Math.random() * 89) + 10 // Số từ 10-99
                });
            }
            resetToInitial();
        }

        function resetToInitial() {
            pause();
            currentActionIdx = 0;
            const container = document.getElementById('array-container');
            container.innerHTML = '';
            domBlocks = [];

            // Căn giữa mảng
            const totalWidth = ARRAY_SIZE * blockSpacing;
            const offsetLeft = (container.clientWidth - totalWidth) / 2 + 10;

            initialArray.forEach((item, i) => {
                const block = document.createElement('div');
                block.className = 'block-el bg-blue-500';
                block.innerText = item.value;
                block.id = `block-${item.id}`;

                // Đặt vị trí
                block.style.left = `${offsetLeft + i * blockSpacing}px`;
                block.style.top = `0px`;

                container.appendChild(block);
                domBlocks.push(block);
            });

            document.getElementById('explanation-box').innerHTML = 'Đã tạo mảng mới. Bấm "Chạy tự động" hoặc "Chạy 1 bước" để bắt đầu.';

            // Xóa highlight code
            document.querySelectorAll('.code-line').forEach(el => {
                el.classList.remove('active-line');
            });

            updateSpeed(); // Đặt lại transition css

            // Biên dịch lại các bước mô phỏng (Thêm tham số cấp độ level = 0)
            actions = [];
            let tempArray = JSON.parse(JSON.stringify(initialArray));
            mergeSortTrace(tempArray, 0, 0);
        }

        // --- TRÌNH GHI LẠI CÁC BƯỚC (GENERATOR TRACE) ---
        function mergeSortTrace(arrParam, startIdxOffset, level) {
            let arrVals = arrParam.map(x => x.value).join(', ');
            actions.push({ type: 'EXPLAIN', message: `Đang xử lý mảng: [${arrVals}] tại cấp đệ quy ${level}.`, line: 0 });
            actions.push({ type: 'LINE', line: 1 });

            if (arrParam.length <= 1) {
                actions.push({ type: 'EXPLAIN', message: `Mảng [${arrVals}] chỉ có 1 phần tử nên hiển nhiên đã được sắp xếp.`, line: 2 });
                return arrParam;
            }

            actions.push({ type: 'LINE', line: 3 });
            let mid = Math.floor(arrParam.length / 2);

            actions.push({ type: 'LINE', line: 4 });
            let left = arrParam.slice(0, mid);

            actions.push({ type: 'LINE', line: 5 });
            let right = arrParam.slice(mid);

            actions.push({
                type: 'DIVIDE',
                leftElements: left.map(x => x.id),
                rightElements: right.map(x => x.id),
                level: level + 1,
                message: `Chia [${arrVals}] thành nửa trái [${left.map(x => x.value).join(', ')}] và nửa phải [${right.map(x => x.value).join(', ')}] và đẩy xuống nhánh cấp ${level + 1}.`,
                line: 6
            });

            let leftSorted = mergeSortTrace(left, startIdxOffset, level + 1);

            actions.push({ type: 'EXPLAIN', message: `Đã xử lý xong nửa trái. Tiếp tục với nửa phải [${right.map(x => x.value).join(', ')}].`, line: 7 });
            let rightSorted = mergeSortTrace(right, startIdxOffset + mid, level + 1);

            actions.push({ type: 'LINE', line: 8 });
            return mergeTrace(leftSorted, rightSorted, startIdxOffset, level);
        }

        function mergeTrace(leftArr, rightArr, startOffset, level) {
            actions.push({ type: 'EXPLAIN', message: `Chuẩn bị gộp hai mảng con: [${leftArr.map(x => x.value).join(', ')}] và [${rightArr.map(x => x.value).join(', ')}] đưa ngược lên cấp ${level}.`, line: 10 });
            actions.push({ type: 'LINE', line: 11 });
            let result = [];

            actions.push({ type: 'LINE', line: 12 });
            let i = 0, j = 0;

            while (i < leftArr.length && j < rightArr.length) {
                actions.push({ type: 'LINE', line: 13 });
                actions.push({ type: 'COMPARE', idx1: leftArr[i].id, idx2: rightArr[j].id, message: `So sánh ${leftArr[i].value} và ${rightArr[j].value}...`, line: 14 });

                if (leftArr[i].value < rightArr[j].value) {
                    actions.push({ type: 'MOVE_UP', id: leftArr[i].id, newVisualIdx: startOffset + result.length, level: level, message: `${leftArr[i].value} nhỏ hơn, được ưu tiên đưa vào mảng kết quả ở trên.`, line: 15 });
                    result.push(leftArr[i]);
                    actions.push({ type: 'LINE', line: 16 });
                    i++;
                } else {
                    actions.push({ type: 'LINE', line: 17 });
                    actions.push({ type: 'MOVE_UP', id: rightArr[j].id, newVisualIdx: startOffset + result.length, level: level, message: `${rightArr[j].value} nhỏ hơn (hoặc bằng), được đưa vào mảng kết quả ở trên.`, line: 18 });
                    result.push(rightArr[j]);
                    actions.push({ type: 'LINE', line: 19 });
                    j++;
                }
            }

            actions.push({ type: 'LINE', line: 20 });
            while (i < leftArr.length) {
                actions.push({ type: 'MOVE_UP', id: leftArr[i].id, newVisualIdx: startOffset + result.length, level: level, message: `Nửa phải đã hết phần tử, đưa nốt ${leftArr[i].value} vào kết quả.`, line: 20 });
                result.push(leftArr[i]);
                i++;
            }

            actions.push({ type: 'LINE', line: 21 });
            while (j < rightArr.length) {
                actions.push({ type: 'MOVE_UP', id: rightArr[j].id, newVisualIdx: startOffset + result.length, level: level, message: `Nửa trái đã hết phần tử, đưa nốt ${rightArr[j].value} vào kết quả.`, line: 21 });
                result.push(rightArr[j]);
                j++;
            }

            actions.push({ type: 'MERGE_DONE', elements: result.map(x => x.id), message: `Đã gộp xong thành mảng: [${result.map(x => x.value).join(', ')}] tại cấp ${level}.`, line: 22 });
            return result;
        }


        // --- BỘ THỰC THI (PLAYER) ---
        function executeAction(action) {
            const container = document.getElementById('array-container');
            const totalWidth = ARRAY_SIZE * blockSpacing;
            const offsetLeft = (container.clientWidth - totalWidth) / 2 + 10;
            const explanationBox = document.getElementById('explanation-box');

            // Cập nhật thông báo giải thích
            if (action.message) {
                explanationBox.innerHTML = action.message;
            }

            // Xóa highlight trên code cũ
            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active-line'));

            // Phục hồi màu cho các khối đang so sánh (vàng)
            document.querySelectorAll('.block-el').forEach(el => {
                if (el.classList.contains('bg-yellow-400')) {
                    el.classList.remove('bg-yellow-400', 'scale-110');
                    el.classList.add('bg-blue-500');
                }
            });

            // 1. Nháy dòng code
            if (action.line !== undefined) {
                const lineEl = document.getElementById(`line-${action.line}`);
                if (lineEl) {
                    lineEl.classList.add('active-line');
                    // Đã tắt tính năng tự động cuộn để tránh giật màn hình
                    // lineEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }

            // 2. Xử lý diễn họa khối đồ hoạ theo dạng cây (Tree)
            if (action.type === 'DIVIDE') {
                // Di chuyển mảng con xuống cấp đệ quy sâu hơn
                const moveDown = (ids) => {
                    ids.forEach(id => {
                        const b = document.getElementById(`block-${id}`);
                        if (b) {
                            b.style.top = `${action.level * verticalSpacing}px`;
                            b.classList.remove('bg-purple-600');
                            b.classList.add('bg-blue-500'); // Trở lại trạng thái "Chưa sắp xếp"
                        }
                    });
                };
                moveDown(action.leftElements);
                moveDown(action.rightElements);
            }
            else if (action.type === 'COMPARE') {
                const b1 = document.getElementById(`block-${action.idx1}`);
                const b2 = document.getElementById(`block-${action.idx2}`);
                if (b1) { b1.classList.remove('bg-blue-500', 'bg-green-500', 'bg-purple-600'); b1.classList.add('bg-yellow-400', 'scale-110'); }
                if (b2) { b2.classList.remove('bg-blue-500', 'bg-green-500', 'bg-purple-600'); b2.classList.add('bg-yellow-400', 'scale-110'); }
            }
            else if (action.type === 'MOVE_UP') {
                // Đưa phần tử trúng tuyển di chuyển LÊN cấp trên
                const b = document.getElementById(`block-${action.id}`);
                if (b) {
                    b.style.top = `${action.level * verticalSpacing}px`;
                    b.style.left = `${offsetLeft + action.newVisualIdx * blockSpacing}px`;

                    b.classList.remove('bg-blue-500', 'bg-yellow-400', 'scale-110');
                    b.classList.add('bg-green-500');
                }
            }
            else if (action.type === 'MERGE_DONE') {
                // Hoàn thành gộp ở nhánh hiện tại
                action.elements.forEach(id => {
                    const b = document.getElementById(`block-${id}`);
                    if (b) {
                        b.classList.remove('bg-green-500', 'bg-blue-500');
                        b.classList.add('bg-purple-600');
                    }
                });
            }
        }

        // --- LOGIC ĐIỀU KHIỂN (CONTROLS) ---
        function getSpeed() {
            return parseInt(document.getElementById('speed-slider').value);
        }

        function updateSpeed() {
            const speedMs = getSpeed();
            // Đảm bảo tốc độ transition css luôn nhanh hơn thời gian lặp một chút để tránh kẹt
            const transitionSpeed = speedMs * 0.8;
            document.querySelectorAll('.block-el').forEach(el => {
                el.style.transition = `all ${transitionSpeed}ms ease-in-out`;
            });
        }

        document.getElementById('speed-slider').addEventListener('input', updateSpeed);

        function togglePlay() {
            if (currentActionIdx >= actions.length) return;

            isPlaying = !isPlaying;
            const btn = document.getElementById('play-btn');

            if (isPlaying) {
                btn.innerHTML = '⏸ Tạm dừng';
                btn.classList.replace('bg-green-600', 'bg-orange-500');
                btn.classList.replace('hover:bg-green-500', 'hover:bg-orange-400');
                runLoop();
            } else {
                pause();
            }
        }

        function pause() {
            isPlaying = false;
            clearTimeout(timer);
            const btn = document.getElementById('play-btn');
            btn.innerHTML = '▶️ Chạy tự động';
            btn.classList.replace('bg-orange-500', 'bg-green-600');
            btn.classList.replace('hover:bg-orange-400', 'hover:bg-green-500');
        }

        function runLoop() {
            if (!isPlaying) return;

            if (currentActionIdx < actions.length) {
                executeAction(actions[currentActionIdx]);
                currentActionIdx++;
                timer = setTimeout(runLoop, getSpeed());
            } else {
                pause(); // Kết thúc thuật toán
            }
        }

        function stepNext() {
            pause(); // Dừng auto-play nếu đang chạy
            if (currentActionIdx < actions.length) {
                executeAction(actions[currentActionIdx]);
                currentActionIdx++;
            }
        }

        // Lắng nghe sự kiện resize để căn giữa lại đồ hoạ
        window.addEventListener('resize', () => {
            if (currentActionIdx === 0) resetToInitial();
        });

        // Chạy lần đầu
        initUI();

    </script>
</body>

</html>
