<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý | The Coffee Shop</title>

    <!-- Tích hợp Tailwind CSS qua CDN để làm giao diện hiện đại cực nhanh -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font chữ Poppins hiện đại -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Icon từ FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Cấu hình màu sắc riêng cho quán cà phê -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Poppins', 'sans-serif'] },
                    colors: {
                        coffee: {
                            50: '#fdf8f6',
                            100: '#f2e8e5',
                            500: '#8c6b5d',
                            600: '#6b4c3a',
                            800: '#4a3326',
                            900: '#2c1e16'
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Tùy chỉnh thanh cuộn cho danh sách mượt mà hơn */
        .menu-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .menu-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .menu-scroll::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        .menu-scroll::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden">

    <!-- Navbar/Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-coffee-600 text-white p-2 rounded-lg">
                    <i class="fa-solid fa-mug-hot text-xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-coffee-900">The Coffee Shop</h1>
            </div>
            <div class="flex items-center gap-4 text-sm font-medium text-gray-500">
                <span><i class="fa-regular fa-clock mr-1"></i> <span id="clock"></span></span>
                <div
                    class="flex items-center gap-2 bg-coffee-50 px-3 py-1.5 rounded-full border border-coffee-100 text-coffee-800">
                    <i class="fa-solid fa-user-circle"></i> Admin
                </div>
            </div>
        </div>
    </header>

    <!-- Khu vực làm việc chính -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 h-[calc(100vh-80px)] flex gap-8">

        <!-- CỘT TRÁI: FORM THÊM ĐỒ UỐNG -->
        <div class="w-1/3 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col h-full">
            <h2 class="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-plus-circle text-coffee-500"></i> Thêm Đồ Uống Mới
            </h2>

            <div class="space-y-5 flex-1">
                <!-- Tên đồ uống -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tên Đồ Uống</label>
                    <input type="text" id="tenHang" placeholder="VD: Bạc xỉu đá..."
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-coffee-500 focus:border-coffee-500 outline-none transition-all">
                </div>

                <!-- 2 cột Kích cỡ & Lượng đá -->
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Kích Cỡ</label>
                        <select id="kichCo"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-coffee-500 outline-none">
                            <option value="Size S">Size S</option>
                            <option value="Size M" selected>Size M</option>
                            <option value="Size L">Size L</option>
                        </select>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Lượng Đá</label>
                        <select id="luongDa"
                            class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-coffee-500 outline-none">
                            <option value="100% Đá" selected>100% Đá</option>
                            <option value="50% Đá">50% Đá</option>
                            <option value="Không Đá">Không Đá</option>
                        </select>
                    </div>
                </div>

                <!-- Giá tiền -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Giá Tiền (VNĐ)</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-dong-sign text-gray-400"></i>
                        </div>
                        <input type="number" id="giaTien" placeholder="25000"
                            class="w-full pl-10 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-coffee-500 focus:border-coffee-500 outline-none transition-all">
                    </div>
                </div>
            </div>

            <!-- Nút bấm -->
            <button onclick="themDoUong()"
                class="w-full mt-6 bg-coffee-600 hover:bg-coffee-800 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-coffee-200 transition-all active:scale-95 flex justify-center items-center gap-2">
                <i class="fa-solid fa-check"></i> Lưu Vào Thực Đơn
            </button>
        </div>

        <!-- CỘT PHẢI: MENU DANH SÁCH -->
        <div class="w-2/3 bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col h-full">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                    <i class="fa-solid fa-clipboard-list text-coffee-500"></i> Menu Đang Bán
                </h2>
                <button onclick="layDanhSach()" class="text-sm text-coffee-600 hover:text-coffee-800 font-medium">
                    <i class="fa-solid fa-rotate-right"></i> Làm mới
                </button>
            </div>

            <!-- Vùng cuộn chứa danh sách -->
            <div class="flex-1 overflow-y-auto menu-scroll pr-2">
                <div id="danhSachDoUong" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <!-- Loading state -->
                    <div class="col-span-full flex flex-col items-center justify-center py-12 text-gray-400">
                        <i class="fa-solid fa-spinner fa-spin text-3xl mb-3 text-coffee-500"></i>
                        <p>Đang kết nối tới máy chủ C#...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Thông báo nổi (Toast Notification) -->
    <div id="toast"
        class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-white border-l-4 border-green-500 shadow-xl rounded-lg p-4 flex items-start gap-3 z-50">
        <i class="fa-solid fa-circle-check text-green-500 mt-1"></i>
        <div>
            <h4 class="font-bold text-gray-800 text-sm" id="toast-title">Thành công</h4>
            <p class="text-gray-500 text-xs mt-1" id="toast-message">Đã thêm đồ uống vào cơ sở dữ liệu.</p>
        </div>
    </div>

    <!-- CODE JAVASCRIPT GIAO TIẾP VỚI C# -->
    <script>
        const API_URL = 'http://localhost:5227/api/hanghoa/douong';

        // Cập nhật đồng hồ
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('vi-VN');
        }, 1000);

        // Hiển thị thông báo góc màn hình thay cho Alert xấu xí
        function showToast(title, message, isError = false) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-message').innerText = message;

            if (isError) {
                toast.classList.replace('border-green-500', 'border-red-500');
                toast.querySelector('i').className = 'fa-solid fa-circle-xmark text-red-500 mt-1';
            } else {
                toast.classList.replace('border-red-500', 'border-green-500');
                toast.querySelector('i').className = 'fa-solid fa-circle-check text-green-500 mt-1';
            }

            toast.classList.remove('translate-y-20', 'opacity-0');

            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 1. LẤY DANH SÁCH TỪ C#
        function layDanhSach() {
            const container = document.getElementById('danhSachDoUong');

            fetch(API_URL)
                .then(response => response.json())
                .then(data => {
                    container.innerHTML = '';

                    if (data.length === 0) {
                        container.innerHTML = `
                            <div class="col-span-full flex flex-col items-center justify-center py-12 text-gray-400 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200">
                                <i class="fa-solid fa-box-open text-4xl mb-3 text-gray-300"></i>
                                <p>Menu đang trống. Hãy thêm đồ uống đầu tiên!</p>
                            </div>`;
                        return;
                    }

                    data.forEach(mon => {
                        // Tạo Card hiển thị món nước cực đẹp
                        const cardHTML = `
                            <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm hover:shadow-md hover:border-coffee-200 transition-all group flex flex-col justify-between">
                                <div class="flex items-start gap-4">
                                    <div class="bg-coffee-50 text-coffee-600 p-3 rounded-lg group-hover:bg-coffee-600 group-hover:text-white transition-colors">
                                        <i class="fa-solid fa-cup-togo text-xl"></i>
                                    </div>
                                    <div>
                                        <h3 class="font-bold text-gray-800 text-sm md:text-base line-clamp-2">${mon.tenHang}</h3>
                                        <div class="flex gap-2 mt-2">
                                            <span class="inline-block bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs font-medium"><i class="fa-solid fa-up-right-and-down-left-from-center mr-1"></i>${mon.kichCo}</span>
                                            <span class="inline-block bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-xs font-medium"><i class="fa-regular fa-snowflake mr-1"></i>${mon.luongDa}</span>
                                        </div>
                                    </div>
                                </div>
                                <div class="mt-4 pt-3 border-t border-gray-50 flex justify-between items-center">
                                    <span class="text-xs text-gray-400">ID: #${mon.id}</span>
                                    <p class="font-bold text-coffee-600 text-lg">${mon.giaTien.toLocaleString()} <span class="text-xs">đ</span></p>
                                </div>
                            </div>
                        `;
                        container.insertAdjacentHTML('beforeend', cardHTML);
                    });
                })
                .catch(error => {
                    container.innerHTML = `<div class="col-span-full text-red-500 text-center py-5"><i class="fa-solid fa-triangle-exclamation"></i> Lỗi mất kết nối đến Server C#.</div>`;
                });
        }

        // 2. THÊM ĐỒ UỐNG LÊN C#
        function themDoUong() {
            const tenHang = document.getElementById('tenHang').value.trim();
            const kichCo = document.getElementById('kichCo').value;
            const luongDa = document.getElementById('luongDa').value;
            const giaTien = document.getElementById('giaTien').value;

            if (!tenHang || !giaTien) {
                showToast("Thiếu thông tin", "Vui lòng nhập tên và giá tiền!", true);
                return;
            }

            const duLieuMoi = {
                tenHang: tenHang,
                kichCo: kichCo,
                luongDa: luongDa,
                giaTien: parseFloat(giaTien),
                maTaiKhoanQuan: 1
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(duLieuMoi)
            })
                .then(response => {
                    if (response.ok) {
                        showToast("Thành công!", `Đã thêm "${tenHang}" vào menu.`);
                        document.getElementById('tenHang').value = '';
                        document.getElementById('giaTien').value = '';
                        layDanhSach(); // Gọi C# để lấy lại danh sách mới nhất
                    } else {
                        response.json().then(err => showToast("Lỗi nhập liệu", err.message || "Kiểm tra lại giá tiền!", true));
                    }
                })
                .catch(error => {
                    showToast("Lỗi Server", "Không thể kết nối đến API C#", true);
                });
        }

        // Load dữ liệu lần đầu
        layDanhSach();
    </script>
</body>

</html>
