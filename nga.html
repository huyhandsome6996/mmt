<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc mừng sinh nhật Nga!</title>
    <!-- Sử dụng Tailwind CSS cho việc tạo giao diện nhanh và đẹp -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Các hiệu ứng chuyển động tùy chỉnh (Animations) */
        .fade-in {
            animation: fadeIn 1s ease-in forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .bounce-custom {
            animation: bounceCustom 0.5s cubic-bezier(0.28, 0.84, 0.42, 1);
        }

        @keyframes bounceCustom {
            0% { transform: scale(1); }
            50% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        /* Kiểu dáng cho các hạt pháo giấy (Confetti) */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 50;
            pointer-events: none;
            border-radius: 2px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-cyan-200 via-yellow-200 to-orange-300 min-h-screen flex items-center justify-center overflow-hidden font-sans m-0">

    <!-- Thẻ Audio để phát nhạc (ẩn trên giao diện) -->
    <!-- Trình duyệt yêu cầu phải có tương tác của người dùng (như click) mới cho phép phát nhạc, điều này rất phù hợp với kịch bản của bạn -->
    <audio id="bday-audio" src="nga.mp3" preload="auto"></audio>

    <!-- Khung chứa nội dung chính -->
    <div id="main-container" class="text-center z-10 p-8 bg-white/50 backdrop-blur-md rounded-3xl shadow-2xl max-w-md w-full mx-4 border border-white/60 transition-all duration-700">

        <!-- Tiêu đề ban đầu -->
        <h1 id="title-text" class="text-2xl md:text-3xl font-bold text-gray-800 mb-6 drop-shadow-md">
            Ê Nga ngố, vào xem cái này đi...
        </h1>

        <!-- Nút bấm tương tác (Thêm touch-manipulation để tránh zoom khi bấm nhanh trên điện thoại) -->
        <button id="magic-btn" class="bg-gradient-to-r from-blue-500 to-teal-500 hover:from-blue-600 hover:to-teal-600 text-white font-bold py-4 px-8 rounded-full shadow-lg transform transition duration-200 hover:scale-105 text-xl select-none outline-none focus:outline-none touch-manipulation">
            Bấm vô đây xem nào!
        </button>

        <!-- Phần hiển thị kết quả (Bị ẩn lúc ban đầu) -->
        <div id="reveal-section" class="hidden flex flex-col items-center">
            <h2 class="text-3xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-600 to-red-600 mb-6 drop-shadow-sm animate-pulse">
                SINH NHẬT VUI VẺ NHA NGA NGỐ!!!
            </h2>
            
            <!-- Hiển thị ảnh nga.png (Thêm max-h-[55vh] để ảnh không bị quá dài trên điện thoại) -->
            <!-- Có dự phòng hiển thị dòng chữ nếu không tìm thấy file ảnh -->
            <img src="nga.png" alt="Nga Birthday Cyberpunk" class="rounded-xl shadow-2xl mb-6 max-w-full max-h-[55vh] md:max-h-[70vh] border-4 border-white/70 object-cover" onerror="this.onerror=null; this.src='https://via.placeholder.com/400x500.png?text=L%E1%BB%97i+ch%C6%B0a+th%E1%BA%A5y+%E1%BA%A3nh+nga.png'">
            
            <p class="text-base md:text-lg text-gray-800 font-medium px-2 md:px-4">
                Chúc Rauma tuổi mới luôn xinh đẹp mạnh khoẻ, chúc hoàng thượng vạn tuê vạn tuế vạn vạn tuế 🎉🎂🤪
            </p>
        </div>

    </div>

    <script>
        // Lấy các thành phần giao diện từ HTML
        const btn = document.getElementById('magic-btn');
        const revealSection = document.getElementById('reveal-section');
        const titleText = document.getElementById('title-text');
        const audio = document.getElementById('bday-audio');
        const container = document.getElementById('main-container');

        let clickCount = 0;
        
        // Mảng chứa các câu nói hiển thị trên nút bấm
        const messages = [
            "Bấm vô đây xem nào!",            // Lần 0 (Ban đầu)
            "Bấm tiếp phát nữa xem!",         // Lần 1
            "Chưa thấy gì à? Thử góc này cơ!",// Lần 2
            "Lại trượt rồi, ráng lên!",       // Lần 3
            "Đùa tí, phát cuối này thề!"      // Lần 4
        ];

        // Xử lý sự kiện khi bấm nút
        btn.addEventListener('click', () => {
            clickCount++;
            
            // Tạo hiệu ứng nảy nhẹ cho nút mỗi lần bấm
            btn.classList.remove('bounce-custom');
            void btn.offsetWidth; // Trigger reflow để animation chạy lại
            btn.classList.add('bounce-custom');

            if (clickCount < 4) {
                // Thay đổi text của nút
                btn.innerText = messages[clickCount];

                // Đổi nút thành fixed để nhảy lung tung trên toàn bộ màn hình
                btn.style.position = 'fixed';
                btn.style.transition = 'left 0.3s ease, top 0.3s ease'; // Hiệu ứng bay mượt mà
                btn.style.zIndex = '100'; // Đảm bảo nút luôn nổi lên trên cùng
                
                // Tính toán vị trí ngẫu nhiên không lẹm ra khỏi màn hình (Thêm khoảng an toàn 30px cho điện thoại)
                const safePadding = 30;
                const maxX = window.innerWidth - btn.offsetWidth - safePadding;
                const maxY = window.innerHeight - btn.offsetHeight - safePadding;
                
                const randomX = Math.max(safePadding, Math.floor(Math.random() * maxX));
                const randomY = Math.max(safePadding, Math.floor(Math.random() * maxY));

                // Cập nhật vị trí mới
                btn.style.left = randomX + 'px';
                btn.style.top = randomY + 'px';
            } else {
                // Khi đã bấm đủ 4 lần -> Hiển thị kết quả
                
                // 1. Ẩn nút và tiêu đề ban đầu
                btn.classList.add('hidden');
                titleText.classList.add('hidden');
                
                // 2. Mở rộng khung chứa để vừa với ảnh
                container.classList.remove('max-w-md');
                container.classList.add('max-w-2xl');
                
                // 3. Hiển thị phần kết quả kèm hiệu ứng mờ dần (fade-in)
                revealSection.classList.remove('hidden');
                revealSection.classList.add('fade-in');
                
                // 4. Phát nhạc sinh nhật
                // .catch() để xử lý trường hợp lỗi (ví dụ file nga.mp3 không tồn tại)
                audio.play().catch(e => {
                    console.log("Không thể phát nhạc, hãy kiểm tra lại file nga.mp3", e);
                });

                // 5. Bắn pháo giấy chúc mừng
                shootConfetti();
            }
        });

        // Hàm tạo hiệu ứng bắn pháo giấy (Confetti) bằng JavaScript thuần
        function shootConfetti() {
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff', '#ff9900'];
            const confettiCount = 150; // Số lượng hạt pháo

            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Vị trí xuất phát ngẫu nhiên theo chiều ngang
                confetti.style.left = Math.random() * 100 + 'vw';
                // Vị trí xuất phát theo chiều dọc (ở trên cùng màn hình)
                confetti.style.top = '-20px';
                // Màu sắc ngẫu nhiên
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                document.body.appendChild(confetti);

                // Tính toán thời gian rơi và độ lệch ngang ngẫu nhiên
                const duration = Math.random() * 3 + 2; // Rơi trong vòng 2 đến 5 giây
                const horizontalSway = (Math.random() - 0.5) * 300; // Lệch trái/phải tối đa 150px
                const rotation = Math.random() * 720; // Xoay vòng

                // Sử dụng Web Animations API để tạo chuyển động rơi xuống
                const animation = confetti.animate([
                    { transform: 'translate3d(0, 0, 0) rotate(0deg)', opacity: 1 },
                    { transform: `translate3d(${horizontalSway}px, 105vh, 0) rotate(${rotation}deg)`, opacity: 0.8 }
                ], {
                    duration: duration * 1000,
                    easing: 'cubic-bezier(.37,0,.63,1)', // Hiệu ứng gia tốc rơi tự nhiên
                    fill: 'forwards'
                });

                // Xóa thẻ div của hạt pháo sau khi rơi xong để giải phóng bộ nhớ
                animation.onfinish = () => {
                    confetti.remove();
                };
            }
        }
    </script>
</body>
</html>
