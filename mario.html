<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mô Phỏng Xóa Phần Tử Trong Linked List (Python)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom Styles for smooth transitions */
        .node-container {
            transition: all 0.5s ease;
        }

        .pointer-label {
            transition: left 0.5s ease, opacity 0.3s ease;
        }

        .code-line {
            transition: background-color 0.2s ease;
            padding: 2px 8px;
            border-radius: 4px;
            font-family: 'Courier New', Courier, monospace;
        }

        .code-line.active {
            background-color: #fef08a;
            /* yellow-200 */
            font-weight: bold;
            color: #b45309;
            /* yellow-700 */
            border-left: 4px solid #eab308;
        }

        svg path {
            transition: d 0.5s ease, stroke 0.3s ease;
        }
    </style>
</head>

<body class="bg-gray-100 h-screen flex flex-col font-sans">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold"><i class="fa-solid fa-link mr-2"></i>Mô Phỏng Xóa Node - Singly Linked List</h1>
        <div class="text-sm bg-blue-700 px-3 py-1 rounded-full">Ngôn ngữ mô phỏng: Python</div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden">

        <!-- Left Panel: Visualization -->
        <section class="w-3/5 flex flex-col border-r border-gray-300 bg-white">

            <!-- Controls -->
            <div class="p-4 bg-gray-50 border-b border-gray-200 flex flex-wrap gap-4 items-end shadow-sm z-10">
                <div class="flex flex-col">
                    <label class="text-xs font-semibold text-gray-600 mb-1">Dữ liệu cần xóa (Key):</label>
                    <input type="number" id="keyInput" value="30"
                        class="border border-gray-300 rounded px-3 py-1.5 w-24 focus:outline-none focus:border-blue-500">
                </div>

                <div class="flex gap-2">
                    <button id="btnStart"
                        class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1.5 rounded shadow flex items-center transition">
                        <i class="fa-solid fa-play mr-2"></i> Bắt đầu xóa
                    </button>
                    <button id="btnReset"
                        class="bg-gray-500 hover:bg-gray-600 text-white px-4 py-1.5 rounded shadow flex items-center transition">
                        <i class="fa-solid fa-rotate-right mr-2"></i> Làm mới List
                    </button>
                </div>

                <div class="flex-1"></div> <!-- Spacer -->

                <div class="flex flex-col items-center">
                    <label class="text-xs font-semibold text-gray-600 mb-1">Tốc độ mô phỏng</label>
                    <input type="range" id="speedSlider" min="100" max="2000" value="800" class="w-32 cursor-pointer"
                        style="direction: rtl;">
                </div>

                <div class="flex gap-2">
                    <button id="btnPauseResume"
                        class="bg-amber-500 hover:bg-amber-600 text-white w-10 h-10 rounded-full shadow flex items-center justify-center transition disabled:opacity-50"
                        disabled>
                        <i class="fa-solid fa-pause"></i>
                    </button>
                    <button id="btnStep"
                        class="bg-indigo-500 hover:bg-indigo-600 text-white w-10 h-10 rounded-full shadow flex items-center justify-center transition disabled:opacity-50"
                        disabled title="Chạy từng bước">
                        <i class="fa-solid fa-forward-step"></i>
                    </button>
                </div>
            </div>

            <!-- Canvas Area -->
            <div id="canvasContainer" class="flex-1 relative overflow-auto p-8 bg-slate-50 min-h-[400px]">
                <!-- Trạng thái hiện tại -->
                <div id="statusText"
                    class="absolute top-4 left-8 text-lg font-semibold text-gray-700 bg-white px-4 py-2 rounded shadow-sm border-l-4 border-blue-500 z-20">
                    Sẵn sàng. Hãy nhấn "Bắt đầu xóa".
                </div>

                <!-- SVG Layer cho các mũi tên -->
                <svg id="arrowLayer" class="absolute top-0 left-0 w-full h-full pointer-events-none z-0"></svg>

                <!-- Vùng chứa Nodes (Tạo động bằng JS) -->
                <div id="nodesLayer" class="absolute top-[200px] left-0 w-full h-24 z-10"></div>

                <!-- Labels con trỏ (Head, Temp, Prev) -->
                <div id="headPointer"
                    class="pointer-label absolute top-[140px] text-center font-bold text-blue-600 opacity-0">
                    <div class="text-sm">head</div>
                    <i class="fa-solid fa-arrow-down"></i>
                </div>
                <div id="tempPointer"
                    class="pointer-label absolute top-[280px] text-center font-bold text-purple-600 opacity-0">
                    <i class="fa-solid fa-arrow-up"></i>
                    <div class="text-sm">temp</div>
                </div>
                <div id="prevPointer"
                    class="pointer-label absolute top-[280px] text-center font-bold text-teal-600 opacity-0">
                    <i class="fa-solid fa-arrow-up"></i>
                    <div class="text-sm">prev</div>
                </div>
            </div>

            <!-- Legend -->
            <div class="p-3 bg-gray-100 flex justify-center gap-6 text-sm text-gray-600">
                <span class="flex items-center">
                    <div class="w-3 h-3 bg-white border-2 border-gray-400 mr-2 rounded"></div> Bình thường
                </span>
                <span class="flex items-center">
                    <div class="w-3 h-3 bg-yellow-100 border-2 border-yellow-500 mr-2 rounded"></div> Đang kiểm tra
                </span>
                <span class="flex items-center">
                    <div class="w-3 h-3 bg-red-100 border-2 border-red-500 mr-2 rounded"></div> Bị xóa
                </span>
                <span class="flex items-center">
                    <div class="w-3 h-3 bg-green-100 border-2 border-green-500 mr-2 rounded"></div> Hoàn thành
                </span>
            </div>
        </section>

        <!-- Right Panel: Code Display -->
        <section class="w-2/5 bg-[#1e1e1e] text-gray-300 flex flex-col">
            <div class="bg-[#2d2d2d] text-gray-400 px-4 py-2 text-sm border-b border-black font-semibold">
                delete_node.py
            </div>
            <div class="p-4 overflow-auto flex-1 text-sm leading-relaxed" id="codeContainer">
                <!-- Mã code sẽ được generate ở đây bằng JS -->
            </div>
        </section>
    </main>

    <script>
        // --- 1. PYTHON CODE TEMPLATE ---
        const pythonCode = [
            "def delete_node(head, key):",
            "    temp = head",
            "    prev = None",
            "",
            "    # Trường hợp 1: Xóa ngay nút đầu",
            "    if temp is not None and temp.data == key:",
            "        head = temp.next",
            "        temp = None",
            "        return head",
            "",
            "    # Trường hợp 2: Tìm nút cần xóa",
            "    while temp is not None:",
            "        if temp.data == key:",
            "            break",
            "        prev = temp",
            "        temp = temp.next",
            "",
            "    # Trường hợp 3: Không tìm thấy",
            "    if temp is None:",
            "        return head",
            "",
            "    # Ngắt liên kết nút khỏi danh sách",
            "    prev.next = temp.next",
            "    temp = None",
            "    return head"
        ];

        // --- 2. BIẾN TOÀN CỤC & TRẠNG THÁI ---
        let initialList = [10, 20, 30, 40, 50];
        let nodes = []; // Lưu trữ DOM element và data của các node

        let simulationSteps = [];
        let currentStepIdx = 0;
        let isPlaying = false;
        let timeoutId = null;
        let speed = 800; // ms

        const X_START = 80;
        const NODE_SPACING = 140;
        const NODE_WIDTH = 60;

        // Elements
        const canvasContainer = document.getElementById('canvasContainer');
        const nodesLayer = document.getElementById('nodesLayer');
        const arrowLayer = document.getElementById('arrowLayer');
        const codeContainer = document.getElementById('codeContainer');
        const statusText = document.getElementById('statusText');

        const headPointer = document.getElementById('headPointer');
        const tempPointer = document.getElementById('tempPointer');
        const prevPointer = document.getElementById('prevPointer');

        const btnStart = document.getElementById('btnStart');
        const btnReset = document.getElementById('btnReset');
        const btnPauseResume = document.getElementById('btnPauseResume');
        const btnStep = document.getElementById('btnStep');
        const speedSlider = document.getElementById('speedSlider');
        const keyInput = document.getElementById('keyInput');

        // --- 3. KHỞI TẠO GIAO DIỆN ---
        function initCodeViewer() {
            codeContainer.innerHTML = '';
            pythonCode.forEach((line, index) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'code-line whitespace-pre';
                lineDiv.id = `code-line-${index + 1}`;

                // Format simple syntax highlighting
                let formattedLine = line;
                formattedLine = formattedLine.replace(/def |if |while |return |and |is |not |break |None/g, match => `<span class="text-pink-400">${match}</span>`);
                formattedLine = formattedLine.replace(/#.*/g, match => `<span class="text-green-500">${match}</span>`);

                lineDiv.innerHTML = `<span class="inline-block w-6 text-gray-500 select-none">${index + 1}</span> ${formattedLine}`;
                codeContainer.appendChild(lineDiv);
            });
        }

        function resetSimulation() {
            clearTimeout(timeoutId);
            isPlaying = false;
            currentStepIdx = 0;
            simulationSteps = [];

            // Cập nhật UI controls
            btnPauseResume.disabled = true;
            btnStep.disabled = true;
            btnPauseResume.innerHTML = '<i class="fa-solid fa-pause"></i>';
            btnStart.disabled = false;
            keyInput.disabled = false;

            highlightCodeLine(0); // Bỏ highlight
            statusText.innerHTML = 'Sẵn sàng. Hãy nhập Key và nhấn "Bắt đầu xóa".';
            statusText.className = 'absolute top-4 left-8 text-lg font-semibold text-gray-700 bg-white px-4 py-2 rounded shadow-sm border-l-4 border-blue-500 z-20';

            // Khởi tạo lại cấu trúc danh sách
            nodesLayer.innerHTML = '';
            arrowLayer.innerHTML = '';
            nodes = initialList.map((data, index) => {
                const isLast = index === initialList.length - 1;

                // DOM Node
                const nodeEl = document.createElement('div');
                nodeEl.className = 'node-container absolute w-[60px] h-[60px] flex items-center justify-center bg-white border-2 border-gray-400 rounded-lg shadow font-bold text-lg text-gray-700 z-10';
                nodeEl.style.left = `${X_START + index * NODE_SPACING}px`;
                nodeEl.innerHTML = data;
                nodesLayer.appendChild(nodeEl);

                return {
                    id: index,
                    data: data,
                    element: nodeEl,
                    nextId: isLast ? null : index + 1,
                    x: X_START + index * NODE_SPACING
                };
            });

            // Reset Pointers
            headPointer.style.opacity = 1;
            movePointer(headPointer, nodes[0].x);

            tempPointer.style.opacity = 0;
            prevPointer.style.opacity = 0;

            drawArrows();
        }

        // --- 4. HÀM VẼ (SVG ARROWS) ---
        function drawArrows() {
            arrowLayer.innerHTML = '';
            nodes.forEach(node => {
                if (node.nextId !== null) {
                    const nextNode = nodes.find(n => n.id === node.nextId);
                    if (nextNode) {
                        drawArrowBetween(node, nextNode);
                    }
                } else if (node.element.style.opacity !== "0") {
                    // Trỏ tới Null
                    drawNullArrow(node);
                }
            });
        }

        function drawArrowBetween(node1, node2) {
            const x1 = node1.x + NODE_WIDTH;
            const y1 = 200 + 30; // 200 is nodesLayer top offset, 30 is half height
            const x2 = node2.x;
            const y2 = y1;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');

            // Vẽ đường cong nếu bypass (bỏ qua một node bị xóa)
            if (node2.id > node1.id + 1) {
                const midX = (x1 + x2) / 2;
                path.setAttribute('d', `M ${x1} ${y1} Q ${midX} ${y1 - 60} ${x2} ${y2}`);
                path.setAttribute('stroke', '#14b8a6'); // teal-500 (chỉ định liên kết mới)
                path.setAttribute('stroke-dasharray', '5,5');
            } else {
                path.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2}`);
                path.setAttribute('stroke', '#64748b'); // slate-500
            }

            path.setAttribute('stroke-width', '3');
            path.setAttribute('fill', 'transparent');
            path.setAttribute('marker-end', 'url(#arrowhead)');
            arrowLayer.appendChild(path);
        }

        function drawNullArrow(node) {
            const x1 = node.x + NODE_WIDTH;
            const y1 = 200 + 30;
            const x2 = x1 + 40;
            const y2 = y1;

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', `M ${x1} ${y1} L ${x2} ${y2}`);
            path.setAttribute('stroke', '#94a3b8');
            path.setAttribute('stroke-width', '2');
            path.setAttribute('stroke-dasharray', '4,4');
            arrowLayer.appendChild(path);

            const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            text.setAttribute('x', x2 + 5);
            text.setAttribute('y', y2 + 5);
            text.setAttribute('fill', '#94a3b8');
            text.setAttribute('font-size', '14');
            text.setAttribute('font-weight', 'bold');
            text.textContent = 'Null';
            arrowLayer.appendChild(text);
        }

        // Tạo arrowhead marker
        function setupSvgDefs() {
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', 'arrowhead');
            marker.setAttribute('markerWidth', '10');
            marker.setAttribute('markerHeight', '7');
            marker.setAttribute('refX', '9');
            marker.setAttribute('refY', '3.5');
            marker.setAttribute('orient', 'auto');

            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            polygon.setAttribute('points', '0 0, 10 3.5, 0 7');
            polygon.setAttribute('fill', '#64748b'); // Sẽ cập nhật màu động nếu cần

            marker.appendChild(polygon);
            defs.appendChild(marker);
            arrowLayer.appendChild(defs);
        }

        // --- 5. LOGIC TẠO BƯỚC MÔ PHỎNG (ENGINE) ---
        function generateSteps(keyToFind) {
            let steps = [];
            let tempIdx = 0; // index trỏ tới head ban đầu
            let prevIdx = null;

            steps.push({ line: 1, msg: `Bắt đầu hàm xóa phần tử có giá trị <b>${keyToFind}</b>.` });

            // temp = head
            steps.push({ line: 2, action: 'setTemp', targetId: tempIdx, msg: `Gán <code>temp = head</code>. Bắt đầu duyệt từ đầu danh sách.` });

            // prev = None
            steps.push({ line: 3, action: 'setPrev', targetId: prevIdx, msg: `Khởi tạo <code>prev = None</code>.` });

            // if temp is not None and temp.data == key:
            steps.push({ line: 6, action: 'checkNode', targetId: tempIdx, msg: `Kiểm tra xem phần tử đầu tiên (Head) có chứa giá trị cần xóa không.` });

            if (nodes[tempIdx].data === keyToFind) {
                // Xóa ở Head
                steps.push({ line: 7, action: 'moveHead', targetId: nodes[tempIdx].nextId, msg: `Giá trị khớp! Cập nhật <code>head</code> trỏ sang phần tử tiếp theo.` });
                steps.push({ line: 8, action: 'deleteNode', targetId: tempIdx, msg: `Hủy bỏ liên kết của nút cũ (Xóa khỏi bộ nhớ).` });
                steps.push({ line: 9, action: 'finish', msg: `Trả về danh sách mới. Quá trình hoàn tất!`, status: 'success' });
                return steps;
            }

            // Loop
            while (tempIdx !== null) {
                steps.push({ line: 12, action: 'checkLoop', msg: `Vòng lặp: Duyệt qua danh sách để tìm giá trị.` });
                steps.push({ line: 13, action: 'checkNode', targetId: tempIdx, msg: `Kiểm tra giá trị nút hiện tại: <code>${nodes[tempIdx].data} == ${keyToFind} ?</code>` });

                if (nodes[tempIdx].data === keyToFind) {
                    steps.push({ line: 14, msg: `Giá trị khớp! Thoát khỏi vòng lặp.` });
                    break;
                }

                prevIdx = tempIdx;
                steps.push({ line: 15, action: 'setPrev', targetId: prevIdx, msg: `Không khớp. Cập nhật <code>prev</code> tiến lên một bước.` });

                tempIdx = nodes[tempIdx].nextId;
                steps.push({ line: 16, action: 'setTemp', targetId: tempIdx, msg: `Cập nhật <code>temp = temp.next</code> để kiểm tra phần tử tiếp theo.` });
            }

            // if temp is None:
            steps.push({ line: 19, msg: `Kiểm tra xem vòng lặp có duyệt hết danh sách mà không tìm thấy không.` });
            if (tempIdx === null) {
                steps.push({ line: 20, action: 'finish', msg: `Không tìm thấy giá trị <b>${keyToFind}</b> trong danh sách. Giữ nguyên danh sách.`, status: 'error' });
                return steps;
            }

            // prev.next = temp.next
            steps.push({ line: 23, action: 'relink', prevId: prevIdx, tempId: tempIdx, msg: `Ngắt liên kết! Cho <code>prev.next</code> trỏ vòng qua <code>temp</code> tới thẳng phần tử phía sau.` });

            // temp = None
            steps.push({ line: 24, action: 'deleteNode', targetId: tempIdx, msg: `Giải phóng bộ nhớ của phần tử bị xóa.` });

            // return head
            steps.push({ line: 25, action: 'finish', msg: `Cập nhật thành công. Trả về head.`, status: 'success' });

            return steps;
        }

        // --- 6. HỆ THỐNG THỰC THI (EXECUTION) ---
        function executeStep(step) {
            // Highlight Code
            if (step.line) highlightCodeLine(step.line);

            // Update Message
            if (step.msg) {
                statusText.innerHTML = step.msg;
                if (step.status === 'success') {
                    statusText.className = 'absolute top-4 left-8 text-lg font-semibold text-green-800 bg-green-100 px-4 py-2 rounded shadow border-l-4 border-green-500 z-20';
                } else if (step.status === 'error') {
                    statusText.className = 'absolute top-4 left-8 text-lg font-semibold text-red-800 bg-red-100 px-4 py-2 rounded shadow border-l-4 border-red-500 z-20';
                } else {
                    statusText.className = 'absolute top-4 left-8 text-lg font-semibold text-gray-700 bg-white px-4 py-2 rounded shadow border-l-4 border-blue-500 z-20';
                }
            }

            // Xóa highlight cũ
            nodes.forEach(n => {
                if (n.element.classList.contains('bg-yellow-100')) {
                    n.element.classList.remove('bg-yellow-100', 'border-yellow-500');
                    n.element.classList.add('bg-white', 'border-gray-400');
                }
            });

            // Xử lý Logic Hành động
            switch (step.action) {
                case 'setTemp':
                    if (step.targetId !== null) {
                        tempPointer.style.opacity = 1;
                        movePointer(tempPointer, nodes[step.targetId].x);
                    } else {
                        tempPointer.style.opacity = 0; // temp reaches end (null)
                    }
                    break;

                case 'setPrev':
                    if (step.targetId !== null) {
                        prevPointer.style.opacity = 1;
                        movePointer(prevPointer, nodes[step.targetId].x);
                    } else {
                        prevPointer.style.opacity = 0;
                    }
                    break;

                case 'checkNode':
                    if (step.targetId !== null) {
                        const el = nodes[step.targetId].element;
                        el.classList.remove('bg-white', 'border-gray-400');
                        el.classList.add('bg-yellow-100', 'border-yellow-500', 'scale-110');
                        setTimeout(() => el.classList.remove('scale-110'), 300);
                    }
                    break;

                case 'moveHead':
                    if (step.targetId !== null) {
                        movePointer(headPointer, nodes[step.targetId].x);
                    } else {
                        headPointer.style.opacity = 0; // Danh sách rỗng
                    }
                    break;

                case 'relink':
                    // Đổi nextId của prev thành nextId của temp
                    const prevNode = nodes.find(n => n.id === step.prevId);
                    const tempNode = nodes.find(n => n.id === step.tempId);
                    prevNode.nextId = tempNode.nextId;

                    // Style lại node bị ngắt kết nối
                    tempNode.element.classList.remove('bg-yellow-100', 'border-yellow-500');
                    tempNode.element.classList.add('bg-red-100', 'border-red-500');

                    drawArrows(); // Vẽ lại đường ngắt
                    break;

                case 'deleteNode':
                    const nodeToDelete = nodes.find(n => n.id === step.targetId);
                    // Hiệu ứng rơi xuống và biến mất
                    nodeToDelete.element.style.transform = 'translateY(50px) scale(0.5)';
                    nodeToDelete.element.style.opacity = '0';
                    tempPointer.style.opacity = 0; // Xóa con trỏ
                    drawArrows();
                    break;

                case 'finish':
                    isPlaying = false;
                    btnPauseResume.disabled = true;
                    btnStep.disabled = true;
                    btnStart.disabled = false;
                    keyInput.disabled = false;
                    break;
            }
        }

        function playLoop() {
            if (!isPlaying) return;

            if (currentStepIdx < simulationSteps.length) {
                executeStep(simulationSteps[currentStepIdx]);
                currentStepIdx++;
                timeoutId = setTimeout(playLoop, speed);
            } else {
                isPlaying = false;
            }
        }

        // --- 7. TIỆN ÍCH UI ---
        function highlightCodeLine(lineNumber) {
            document.querySelectorAll('.code-line').forEach(el => el.classList.remove('active'));
            if (lineNumber > 0) {
                const line = document.getElementById(`code-line-${lineNumber}`);
                if (line) {
                    line.classList.add('active');
                    // Scroll vào vùng nhìn thấy
                    line.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            }
        }

        function movePointer(pointerEl, xTarget) {
            // Canh giữa text (width khoảng 40px) với node (width 60px)
            pointerEl.style.left = `${xTarget + 10}px`;
        }

        // --- 8. SỰ KIỆN NÚT BẤM ---
        btnStart.addEventListener('click', () => {
            const keyToFind = parseInt(keyInput.value);
            if (isNaN(keyToFind)) {
                alert("Vui lòng nhập một số hợp lệ!");
                return;
            }

            resetSimulation();
            setupSvgDefs();

            simulationSteps = generateSteps(keyToFind);

            isPlaying = true;
            btnStart.disabled = true;
            keyInput.disabled = true;
            btnPauseResume.disabled = false;
            btnStep.disabled = true;

            playLoop();
        });

        btnPauseResume.addEventListener('click', () => {
            if (isPlaying) {
                // Đang chạy -> Tạm dừng
                isPlaying = false;
                clearTimeout(timeoutId);
                btnPauseResume.innerHTML = '<i class="fa-solid fa-play"></i>';
                btnStep.disabled = false; // Cho phép chạy từng bước
            } else {
                // Đang dừng -> Chạy tiếp
                isPlaying = true;
                btnPauseResume.innerHTML = '<i class="fa-solid fa-pause"></i>';
                btnStep.disabled = true;
                playLoop();
            }
        });

        btnStep.addEventListener('click', () => {
            if (currentStepIdx < simulationSteps.length) {
                executeStep(simulationSteps[currentStepIdx]);
                currentStepIdx++;
            }
        });

        btnReset.addEventListener('click', () => {
            resetSimulation();
            setupSvgDefs();
        });

        speedSlider.addEventListener('input', (e) => {
            // Đảo ngược logic thanh trượt: Kéo qua phải = giá trị nhỏ (nhanh hơn)
            speed = parseInt(e.target.value);
        });

        // --- KHỞI CHẠY LẦN ĐẦU ---
        initCodeViewer();
        resetSimulation();
        setupSvgDefs();

    </script>
</body>

</html>
